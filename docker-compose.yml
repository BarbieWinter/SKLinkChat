services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server-py:
    build:
      context: ./server-py
    environment:
      SERVER_PY_REDIS_URL: redis://redis:6379/0
      SERVER_PY_HOST: 0.0.0.0
      SERVER_PY_PORT: 8000
      SERVER_PY_LOG_LEVEL: INFO
      SERVER_PY_RECONNECT_WINDOW_SECONDS: 180
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 10

  client:
    build:
      context: ./client
      args:
        VITE_ENDPOINT: http://localhost:8000
        VITE_WS_ENDPOINT: ws://localhost:8000/ws
    ports:
      - "4173:4173"
    depends_on:
      server-py:
        condition: service_healthy
