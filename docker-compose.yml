services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sklinkchat
      POSTGRES_USER: sklinkchat
      POSTGRES_PASSWORD: sklinkchat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sklinkchat -d sklinkchat"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server-py:
    build:
      context: ./server-py
    environment:
      SERVER_PY_DATABASE_URL: postgresql+psycopg://sklinkchat:sklinkchat@postgres:5432/sklinkchat
      SERVER_PY_REDIS_URL: redis://redis:6379/0
      SERVER_PY_HOST: 0.0.0.0
      SERVER_PY_PORT: 8000
      SERVER_PY_LOG_LEVEL: INFO
      SERVER_PY_RECONNECT_WINDOW_SECONDS: 180
      SERVER_PY_PARTNER_DISCONNECT_GRACE_SECONDS: 1
      SERVER_PY_APP_BASE_URL: http://localhost:4173
      SERVER_PY_STACK_AUTH_ENABLED: "true"
      SERVER_PY_STACK_PROJECT_ID: ${SERVER_PY_STACK_PROJECT_ID:?set SERVER_PY_STACK_PROJECT_ID in .env}
      SERVER_PY_STACK_SECRET_SERVER_KEY: ${SERVER_PY_STACK_SECRET_SERVER_KEY:?set SERVER_PY_STACK_SECRET_SERVER_KEY in .env}
      SERVER_PY_STACK_API_BASE_URL: ${SERVER_PY_STACK_API_BASE_URL:-https://api.stack-auth.com}
      SERVER_PY_SECURE_COOKIES: "false"
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 10

  client:
    build:
      context: ./client
      args:
        VITE_ENDPOINT: http://localhost:8000
        VITE_WS_ENDPOINT: ws://localhost:8000/ws
        VITE_STACK_PROJECT_ID: ${VITE_STACK_PROJECT_ID:?set VITE_STACK_PROJECT_ID in .env}
        VITE_STACK_PUBLISHABLE_CLIENT_KEY: ${VITE_STACK_PUBLISHABLE_CLIENT_KEY:?set VITE_STACK_PUBLISHABLE_CLIENT_KEY in .env}
    ports:
      - "4173:4173"
    depends_on:
      server-py:
        condition: service_healthy

volumes:
  postgres_data:
