name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: Build and lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "server-py[dev]"

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Backend lint
        working-directory: server-py
        run: ruff check app

      - name: Backend compile
        working-directory: server-py
        run: python -m compileall app

      - name: Frontend lint
        working-directory: client
        run: npm run lint

      - name: Frontend build
        working-directory: client
        run: npm run build

      - name: Docker Compose config
        env:
          SERVER_PY_STACK_PROJECT_ID: ci-stack-project
          SERVER_PY_STACK_SECRET_SERVER_KEY: ci-stack-secret
          VITE_STACK_PROJECT_ID: ci-stack-project
          VITE_STACK_PUBLISHABLE_CLIENT_KEY: ci-stack-publishable
        run: docker compose config
